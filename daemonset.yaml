apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: honeybr-security-monitor
  namespace: default
  labels:
    app: honeybr
    component: security-monitor
spec:
  selector:
    matchLabels:
      app: honeybr
      component: security-monitor
  template:
    metadata:
      labels:
        app: honeybr
        component: security-monitor
    spec:
      serviceAccountName: honeybr-service-account
      containers:
      - name: honeybr-monitor
        image: honeybr:latest
        imagePullPolicy: Always
        securityContext:
          privileged: true
          capabilities:
            add: 
              - SYS_ADMIN
              - NET_ADMIN
              - SYS_RESOURCE
              - BPF
              - PERFMON
        volumeMounts:
        - name: debugfs
          mountPath: /sys/kernel/debug
        - name: lib-modules
          mountPath: /lib/modules
          readOnly: true
        - name: usr-src
          mountPath: /usr/src
          readOnly: true
        - name: boot
          mountPath: /boot
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: debugfs
        hostPath:
          path: /sys/kernel/debug
          type: Directory
      - name: lib-modules
        hostPath:
          path: /lib/modules
          type: Directory
      - name: usr-src
        hostPath:
          path: /usr/src
          type: Directory
      - name: boot
        hostPath:
          path: /boot
          type: Directory
      hostNetwork: true
      hostPID: true
      tolerations:
      - operator: Exists
        effect: NoSchedule
      nodeSelector: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: honeybr-service-account
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: honeybr-monitor-role
rules:
- apiGroups: [""]
  resources: ["pods", "nodes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: honeybr-monitor-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: honeybr-monitor-role
subjects:
- kind: ServiceAccount
  name: honeybr-service-account
  namespace: default
