image:
  repository: ghcr.io/hudsoncoutinho/honeybr
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 8080
  nodePort: 32080

resources: {}

# eBPF tracepoints + ring buffer require elevated privileges on most clusters.
securityContext:
  privileged: true

rules:
  sensitive_paths:
    - "/etc/shadow"
    - "/root/.ssh/id_rsa"
  suspicious_ports:
    - 4444
    - 1337
